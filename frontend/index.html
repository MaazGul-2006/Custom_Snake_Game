<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Tactical Snake</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <h2>Tactical Snake Sandbox</h2>
        <div id="scoreboard">
            <div>Score: <span id="score-val">0</span></div>
            <div>Food Timer: <span id="food-timer-val">10</span>s</div>
            <div>Rush Window (25s): <span id="rush-timer-val">25</span>s</div>
            <div>Food Eaten: <span id="rush-count-val">0</span>/4</div>
        </div>
        
        <!-- The 2D Grid render window -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="instructions">
            <p>Use Arrow Keys to steer. Eat 4 foods within 25s to shrink your tail!</p>
        </div>
    </div>

    <!-- Script loading chain -->
    <script src="js/analytics.js"></script>
    <script src="js/objects.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
